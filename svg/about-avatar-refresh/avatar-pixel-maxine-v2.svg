<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none" shape-rendering="crispEdges">
  <rect width="128" height="128" fill="none"/>

  <!-- blue spark -->
  <rect x="101" y="11" width="10" height="4" fill="#2F5BFF"/>
  <rect x="104" y="8" width="4" height="10" fill="#2F5BFF"/>

  <!-- shadow base -->
  <rect x="28" y="104" width="58" height="8" fill="#111111" opacity="0.18"/>

  <!-- outer frame -->
  <rect x="34" y="18" width="38" height="56" fill="#FFFFFF" stroke="#111111" stroke-width="4"/>
  <rect x="30" y="74" width="46" height="34" fill="#2F5BFF" stroke="#111111" stroke-width="4"/>
  <rect x="24" y="106" width="58" height="8" fill="#2F5BFF" stroke="#111111" stroke-width="4"/>

  <!-- hair back -->
  <rect x="40" y="24" width="26" height="22" fill="#1F1F23"/>
  <rect x="38" y="28" width="30" height="18" fill="#1F1F23"/>
  <rect x="38" y="44" width="10" height="14" fill="#1F1F23"/>
  <rect x="58" y="44" width="10" height="14" fill="#1F1F23"/>

  <!-- face -->
  <rect x="44" y="30" width="18" height="20" fill="#F4C9B5"/>
  <rect x="46" y="50" width="14" height="4" fill="#EAB7A4"/>

  <!-- bangs -->
  <rect x="42" y="26" width="22" height="8" fill="#1F1F23"/>
  <rect x="40" y="30" width="6" height="10" fill="#1F1F23"/>
  <rect x="60" y="30" width="4" height="8" fill="#1F1F23"/>

  <!-- glasses -->
  <rect x="46" y="38" width="5" height="4" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="55" y="38" width="5" height="4" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="51" y="39" width="4" height="2" fill="#111111"/>

  <!-- face details -->
  <rect x="48" y="39" width="1.5" height="1.5" fill="#111111"/>
  <rect x="57" y="39" width="1.5" height="1.5" fill="#111111"/>
  <rect x="52" y="42" width="2" height="4" fill="#DFA18C"/>
  <rect x="49" y="46" width="8" height="2" fill="#B25D63"/>

  <!-- neck -->
  <rect x="49" y="54" width="8" height="6" fill="#F4C9B5"/>

  <!-- blazer / shirt -->
  <rect x="34" y="74" width="38" height="30" fill="#2F5BFF"/>
  <rect x="46" y="60" width="14" height="18" fill="#FFFFFF"/>
  <rect x="42" y="74" width="8" height="18" fill="#1E44D8"/>
  <rect x="58" y="74" width="8" height="18" fill="#1E44D8"/>
  <rect x="48" y="64" width="10" height="10" fill="#FFFFFF"/>
  <rect x="51" y="68" width="4" height="8" fill="#111111"/>

  <!-- arms -->
  <rect x="30" y="80" width="6" height="16" fill="#2F5BFF"/>
  <rect x="70" y="80" width="6" height="16" fill="#2F5BFF"/>

  <!-- details / outline accents -->
  <rect x="34" y="18" width="38" height="4" fill="#111111"/>
  <rect x="72" y="18" width="4" height="56" fill="#111111"/>
  <rect x="30" y="104" width="46" height="4" fill="#111111"/>
</svg>
